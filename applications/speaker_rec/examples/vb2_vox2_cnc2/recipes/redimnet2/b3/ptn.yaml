# b3 PT: 110ep on the VoxCeleb2 + VoxBlink2 + CN-Celeb2 mix.
#
# Uses the hard augmentation pipeline from the source b3 recipe:
#   * Sequential aug tree (from dataset.augs) replaces the legacy
#     wespeaker_augs preset path.
#   * MUSAN noise/music/babble OneOf at the standard hard_augs.md SNRs,
#     plus RIR reverb.
#   * LowPassAug as a OneOf with two cutoffs:
#       - cutoff_ratio=0.5  → mimics 8 kHz bandlimited (telephony) audio.
#       - cutoff_ratio=0.6  → softer band-limit, used as a spec-aug
#         replacement (do_spec_aug stays False).
#   * CodecAug at moderate prob (mp3 / opus / vorbis / g722 / g711);
#     verified to run in the palabra_universe_2 conda env.
#
# Schedule, model, optimizer are unchanged from the original b3 ptn.yaml.
# Data is adapted for applications/speaker_rec raw_fast manifests produced by this example.

compile_backbone:
  mode: default
data_type: raw_fast
dataloader_args:
  batch_size: 160
  drop_last: true
  num_workers: 16
  pin_memory: false
  prefetch_factor: 2
  seed_worker: true
grad_accum_steps: 1
dataset_args:
  aug_setup:
    aug_type: Sequential
    prob: 0.9
    augmentors:
    - aug_type: OneOf
      prob: 0.8
      augmentors:
      - aug_type: CustomNoise
        dataset_dir: /data/wespeaker_data/raw/musan/music
        snr: [2, 12]
        prob: 1.0
      - aug_type: CustomNoise
        dataset_dir: /data/wespeaker_data/raw/musan/noise
        snr: [0, 12]
        prob: 1.0
      - aug_type: CustomNoise
        dataset_dir: /data/wespeaker_data/raw/musan/speech
        snr: [7, 18]
        babble: true
        prob: 1.0
    - aug_type: Reverb
      lmdb_file: /data/wespeaker_data/rirs/lmdb
      prob: 0.2
    - aug_type: OneOf
      prob: 0.25
      augmentors:
      # - aug_type: LowPassAug
      #   cutoff_ratio: 0.5
      #   transition_width: 0.08
      #   prob: 1.0
      - aug_type: LowPassAug
        cutoff_ratio: 0.6
        transition_width: 0.08
        prob: 1.0
    # - aug_type: CodecAug
    #   sample_rate: 16000
    #   prob: 0.25
  fbank_args:
    dither: 1.0
    frame_length: 25
    frame_shift: 10
    num_mel_bins: 80
  num_frms: 200
  resample_rate: 16000
  sample_num_per_epoch: 0
  shuffle: true
  shuffle_args:
    shuffle_size: 2500
  speed_perturb: true
enable_amp: true
eval_dur: 8.0
exp_dir: exp/vox2_vb2_cnc2/b3_gnorm_110ep/ptn_ha
gpus:
- 0
- 1
- 2
- 3
- 4
- 5
- 6
- 7
log_batch_interval: 25
loss: CrossEntropyLoss
loss_args: {}
loss_weight_decay_mult: 0.1
mixup_alpha: null
model: ReDimNet2Custom
model_args:
  C: 24
  F: 72
  agg_gnorm: true
  block_1d_type: conv+att
  block_2d_type: basic_resnet
  causal: none
  compress_tconvs: true
  emb_bn: false
  embed_dim: 192
  feat_type: tf
  fm_weigthing_type: NC
  global_context_att: true
  group_divisor: 1
  hop_length: 160
  out_channels: 224
  pooling_func: ASTP
  return_2d_output: true
  spec_in_channels: 1
  spec_params:
    do_preemph: true
    do_spec_aug: false
    norm_signal: true
num_avg: 10
num_epochs: 110
optimizer: SGD
optimizer_args:
  lr: 0.025
  momentum: 0.9
  nesterov: true
  weight_decay: 2.0e-05
projection_args:
  do_lm: false
  easy_margin: false
  embed_dim: 192
  lanbuda: 0.7
  margin_type: C
  project_type: sphereface2
  scale: 32.0
  t: 3
margin_scheduler: MarginScheduler
margin_update:
  final_margin: 0.2
  fix_start_epoch: 30
  increase_start_epoch: 15
  increase_type: exp
  initial_margin: 0.0
  update_margin: true
save_epoch_interval: 1
scheduler: ExponentialDecayPlateauWithWarmup
scheduler_args:
  initial_lr: 0.025
  final_lr: 1.0e-4
  warm_up_epoch: 8
  warm_from_zero: true
  plateau_epochs: 32
  decay_epochs: 10
  decay_rate: 0.5
  staircase: false
seed: 42
train_data: /data/wespeaker_data/vox2_vb2_cnc2_v0/mix_join/data.list
train_label: /data/wespeaker_data/vox2_vb2_cnc2_v0/mix_join/utt2spk
val_type: local
validation:
  vox1: /data/wespeaker_data/vox1-test
